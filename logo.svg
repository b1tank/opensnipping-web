<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cute Scissors Icon -->
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Blades (Neutral: Light Grey) -->
  <path d="M26 40 L49 10" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round" filter="url(#soft-shadow)"/>
  <path d="M40 40 L15 10" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round" filter="url(#soft-shadow)"/>

  <!-- Handles (Unified Color: Reddish, Hollow) -->
  <circle cx="20" cy="48" r="8" fill="none" stroke="#EE5253" stroke-width="5" filter="url(#soft-shadow)"/>
  <circle cx="44" cy="48" r="8" fill="none" stroke="#EE5253" stroke-width="5" filter="url(#soft-shadow)"/>
</svg>
